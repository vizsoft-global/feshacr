# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/fonts/
    - assets/images/
    - assets/videos/
    - assets/audios/
    - assets/rive_animations/
    - assets/pdfs/
    - assets/jsons/

    - assets/environment_values/
  fonts:
    - family: 'Misaki'
      fonts:
        - asset: assets/fonts/MISAKI.ttf
    - family: 'Gentona'
      fonts:
        - asset: assets/fonts/Gentona-SemiBold.ttf
          weight: 600
    - family: 'Misaki2'
      fonts:
        - asset: assets/fonts/misaki.regular.ttf
          weight: 600
    - family: 'Gentona Medium'
      fonts:
        - asset: assets/fonts/Gentona-Medium.ttf
          weight: 500

    - family: Icomoonfi1
      fonts:
        - asset: assets/fonts/icomoonfi1.ttf
    - family: Icomoonfi2
      fonts:
        - asset: assets/fonts/icomoonfi2.ttf
    - family: FeshahHomeIcon
      fonts:
        - asset: assets/fonts/feshah-home-icon.ttf


